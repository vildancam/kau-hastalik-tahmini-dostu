<!doctype html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}KAÜ - HASTALIK TAHMİNİ DOSTU{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="medical-bg" aria-hidden="true">
    <span><i class="bi bi-heart-pulse"></i></span>
    <span><i class="bi bi-capsule"></i></span>
    <span><i class="bi bi-bandaid"></i></span>
    <span><i class="bi bi-hospital"></i></span>
</div>
<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
            <img src="{{ url_for('static', filename='assets/kafkas_logo.png') }}" alt="KAÜ" class="brand-logo">
            <span>{{ app_name or "KAÜ - HASTALIK TAHMİNİ DOSTU" }}</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.index') }}">Ana Sayfa</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.predict_page') }}">Belirti Seç</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.analysis_page') }}">Analiz</a></li>
                <li class="nav-item"><a class="nav-link" href="#pharmacySection">Nöbetçi Eczane</a></li>
                <li class="nav-item">
                    <button class="btn btn-sm btn-outline-light" id="themeToggle" type="button" title="Tema değiştir">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-sm btn-outline-light" id="muteToggle" type="button" title="Sesi aç/kapat">
                        <i class="bi bi-volume-up"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="py-4 mt-5 border-top">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 small text-secondary">
        <span>“Sağlık, insanın en büyük zenginliğidir.”</span>
        <span>Vildan Çam, 2026 tüm hakları saklıdır</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
